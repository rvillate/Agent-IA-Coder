<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Coder Gateway</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div>
          <p class="eyebrow">Raspberry Gateway</p>
          <h1>Agent Coder Central</h1>
          <p>API central con DB local para GPT Actions y runners remotos.</p>
        </div>
        <div class="status-card">
          <span id="status-dot" class="dot"></span>
          <span id="status-text">Sin probar</span>
        </div>
      </section>

      <section class="panel grid-2">
        <label>
          API base URL
          <input id="apiBase" value="/api" />
        </label>
        <label>
          x-agent-key
          <input id="apiKey" type="password" placeholder="Pega tu AGENT_API_KEY" />
        </label>
        <label>
          Runner target
          <input id="runnerTarget" value="local-runner-1" />
        </label>
        <div class="actions">
          <button id="saveConfig">Guardar</button>
          <button id="healthBtn">Probar health</button>
          <button id="runnersBtn">Ver runners</button>
          <button id="jobsBtn">Ver jobs</button>
        </div>
      </section>

      <section class="panel">
        <h2>Crear job</h2>
        <div class="grid-2">
          <label>
            Tipo
            <select id="jobType">
              <option>file.list</option>
              <option>file.read</option>
              <option>file.write</option>
              <option>file.mkdir</option>
              <option>file.search</option>
              <option>shell.exec</option>
              <option>git.status</option>
              <option>git.diff</option>
              <option>file.delete</option>
            </select>
          </label>
          <label>
            Nota opcional
            <input id="jobNote" placeholder="Prueba desde panel" />
          </label>
        </div>
        <label>
          Payload JSON
          <textarea id="payload" rows="10">{
  "path": ".",
  "maxDepth": 2
}</textarea>
        </label>
        <div class="actions">
          <button id="createJobBtn">Crear job</button>
          <button id="sampleListBtn">Ejemplo file.list</button>
          <button id="sampleNodeBtn">Ejemplo node -v</button>
          <button id="sampleWriteBtn">Ejemplo chain</button>
        </div>
      </section>

      <section class="panel">
        <h2>Resultado</h2>
        <pre id="output">Listo.</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
